<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    
    <!-- CUSTOM SEO & BRANDING METADATA -->
    <title>Amir Rafiei | Statistics @ UC Berkeley</title>
    
    <!-- Standard Description (Used by Google Search) -->
    <meta 
      name="description"
      content="Amir Rafiei: Statistics student at UC Berkeley showcasing C++ systems programming projects, including a UNIX Command Interpreter (FlashShell) and deep experience in process management and distributed computing."
    />
    
    <!-- Keywords (Helpful but less critical than description) -->
    <meta name="keywords" content="Amir Rafiei, UC Berkeley, Statistics, Systems Programming, C++, UNIX Shell, IPC, Process Management, Distributed Systems, Software Engineer, Portfolio"/>

    <!-- Open Graph Tags (For LinkedIn, Facebook, and Twitter Previews) -->
    <meta property="og:title" content="Amir Rafiei | Systems Engineering & Strategy Portfolio" />
    <meta property="og:description" content="UC Berkeley student showcasing deep technical execution in C++ systems programming and product thinking." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourusername.github.io/your-repo-name" />
    <!-- Note: og:image requires a public URL to your screenshot/logo -->
    <!-- <meta property="og:image" content="https://yourusername.github.io/your-repo-name/screenshot.png" /> -->


    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Tailwind CSS CDN (For local development/prototyping) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
    -->
    
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      The build step will place the bundled scripts into the 
      <body> tag.
    -->
  </body>
</html>
